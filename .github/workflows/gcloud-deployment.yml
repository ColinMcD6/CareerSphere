name: Deploy to GKE

on:
  push:
    branches:
    - 'nginx'

env:
  GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
  BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
  FRONTEND_PORT: 80
  MONGODB_USER: ${{ secrets.MONGODB_USER }}
  MONGODB_PASS: ${{ secrets.MONGODB_PASS }}
  JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
  JWTREFRESH_SECRET_VALUE: ${{ secrets.JWTREFRESH_SECRET}}
  RESEND_API_KEY_VALUE: ${{ secrets.RESEND_API_KEY }}
  GKE_CLUSTER: autopilot-cluster-careersphere--1
  GKE_REGION: us-central1
  GAR_REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: code checkout
      uses: actions/checkout@v2

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
      with:
        version: '>= 363.0.0'

    - name: build and push the backend docker image
      run: |
        gcloud auth configure-docker $GAR_REGION-docker.pkg.dev
        docker build -t $GAR_REGION-docker.pkg.dev/$GOOGLE_PROJECT/docker-career-sphere/backend:latest ./backend
        docker push $GAR_REGION-docker.pkg.dev/$GOOGLE_PROJECT/docker-career-sphere/backend:latest
        BACKEND_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $GAR_REGION-docker.pkg.dev/$GOOGLE_PROJECT/docker-career-sphere/backend:latest)
        echo "BACKEND_DIGEST=$BACKEND_DIGEST" >> $GITHUB_ENV

    - name: Get GKE credentials
      run: |
        gcloud components install gke-gcloud-auth-plugin
        gcloud container clusters get-credentials $GKE_CLUSTER --region $GKE_REGION --project $GOOGLE_PROJECT

    - name: deploy backend to gke
      run: |
        sed -i "s|image: .*$|image: $BACKEND_DIGEST|" ./backend/backend-deployment.yml
        kubectl apply -f ./backend/backend-deployment.yml
        # Wait for LoadBalancer IP to be assigned
        BACKEND_IP=$(kubectl get svc backend-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        while [ -z "$BACKEND_IP" ]; do
          echo "Waiting for LoadBalancer IP..."
          sleep 5
          BACKEND_IP=$(kubectl get svc backend-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        done
        echo "Backend IP: $BACKEND_IP"
        # Store IP as GitHub environment variable
        echo "BACKEND_IP=$BACKEND_IP" >> $GITHUB_ENV
        # sed -i "s|__BACKEND_IP__|$BACKEND_IP|g" ./backend/backend-deployment.yml
        # kubectl apply -f ./backend/backend-deployment.yml

    - name: build and push the frontend docker image
      run: |
        gcloud auth configure-docker $GAR_REGION-docker.pkg.dev
        docker build -t $GAR_REGION-docker.pkg.dev/$GOOGLE_PROJECT/docker-career-sphere/frontend:latest --build-arg VITE_API_URL=http://$BACKEND_IP:4004 ./frontend
        docker push $GAR_REGION-docker.pkg.dev/$GOOGLE_PROJECT/docker-career-sphere/frontend:latest
        FRONTEND_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $GAR_REGION-docker.pkg.dev/$GOOGLE_PROJECT/docker-career-sphere/frontend:latest)
        echo "FRONTEND_DIGEST=$FRONTEND_DIGEST" >> $GITHUB_ENV

    - name: deploy frontend to gke
      run: |
        sed -i "s|image: .*$|image: $FRONTEND_DIGEST|" ./frontend/frontend-deployment.yml
        kubectl apply -f ./frontend/frontend-deployment.yml
        # Wait for LoadBalancer IP to be assigned
        FRONTEND_IP=$(kubectl get svc frontend-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        while [ -z "$FRONTEND_IP" ]; do
          echo "Waiting for LoadBalancer IP..."
          sleep 5
          FRONTEND_IP=$(kubectl get svc frontend-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        done
        echo "Backend IP: $FRONTEND_IP"
        # Store IP as GitHub environment variable
        echo "FRONTEND_IP=$FRONTEND_IP" >> $GITHUB_ENV
        sed -i "s|__FRONTEND_IP__|$FRONTEND_IP|g" ./backend/backend-deployment.yml
        kubectl apply -f ./backend/backend-deployment.yml
